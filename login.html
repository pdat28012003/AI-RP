<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - AI Chat Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 50px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            text-align: center;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            text-align: center;
            border-left: 4px solid #3c3;
        }

        .success-message.show {
            display: block;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        .footer-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            background: #f0f4ff;
            color: #333;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            border-left: 3px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Đăng Nhập</h1>
            <p>Hệ Thống Quản Lý Báo Cáo AI</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Tên Tài Khoản</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Nhập tên tài khoản" 
                    required 
                    autocomplete="username"
                />
            </div>

            <div class="form-group">
                <label for="password">Mật Khẩu</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Nhập mật khẩu" 
                    required 
                    autocomplete="current-password"
                />
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Đăng Nhập
            </button>

            <div class="loading" id="loading">
                <span class="spinner"></span>
                <span>Đang xử lý...</span>
            </div>
        </form>

        <div class="info-text">
            💡 Liên hệ quản trị viên để nhận tài khoản đăng nhập
        </div>

        <div class="footer-link">
            <a href="/">← Quay lại trang chủ</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            // Clear messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            if (!username || !password) {
                errorMsg.textContent = '❌ Vui lòng nhập tên tài khoản và mật khẩu';
                errorMsg.classList.add('show');
                return;
            }

            loginBtn.disabled = true;
            loading.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save session ID to localStorage
                    localStorage.setItem('sessionId', data.sessionId);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);

                    successMsg.textContent = `✅ Đăng nhập thành công! Chào mừng ${data.username}`;
                    successMsg.classList.add('show');

                    // Redirect to admin page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 1500);
                } else {
                    errorMsg.textContent = `❌ ${data.error || 'Đăng nhập thất bại'}`;
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = '❌ Lỗi kết nối. Vui lòng kiểm tra lại.';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        // Check if already logged in
        (async () => {
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/auth/check`, {
                        headers: { 'x-session-id': sessionId }
                    });
                    const data = await response.json();

                    if (data.authenticated) {
                        // Redirect to admin if already logged in
                        window.location.href = '/admin';
                    }
                } catch (error) {
                    console.error('Auth check error:', error);
                }
            }
        })();

        // Enable login button on password input
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
